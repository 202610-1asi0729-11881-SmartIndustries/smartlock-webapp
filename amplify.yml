version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        - "sed -i 's|http://localhost:8080/api/v1|/api/v1|g' src/environments/environment.ts"
    build:
      commands:
        - npm run build --configuration=production
  artifacts:
    baseDirectory: dist/smartlock-webapp/browser
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*

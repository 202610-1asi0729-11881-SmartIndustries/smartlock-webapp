<div class="auth-wrapper">
  <mat-card class="auth-card">
    <mat-card-title class="auth-title">SmartLock</mat-card-title>
    <mat-card-content>
      <h2 class="auth-heading">Sign in</h2>

      <form (ngSubmit)="onSubmit()" #signInForm="ngForm">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
          <mat-icon matPrefix>mail</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            [(ngModel)]="password"
            name="password"
            required
            autocomplete="current-password"
          />
          <mat-icon matPrefix>lock</mat-icon>
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hidePassword = !hidePassword"
          >
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <button
          mat-flat-button
          type="submit"
          class="full-width submit-btn"
          [disabled]="store.loading()"
        >
          {{ store.loading() ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>

      @if (store.error()) {
        <div class="auth-error">{{ store.error() }}</div>
      }

      @if (store.successMessage()) {
        <div class="auth-success">{{ store.successMessage() }}</div>
      }

      <p class="auth-switch">
        Don&apos;t have an account?
        <a routerLink="/auth/sign-up">Sign up</a>
      </p>
    </mat-card-content>
  </mat-card>
</div>

<h2 matDialogTitle>Create person</h2>
<mat-dialog-content>
  <mat-form-field>
    <mat-label>Name</mat-label>
    <input matInput>
  </mat-form-field>
  <mat-form-field>
    <mat-label>Last name</mat-label>
    <input matInput>
  </mat-form-field>
  <mat-form-field>
    <mat-label>Email</mat-label>
    <input matInput>
  </mat-form-field>
  <div class="row">
    <mat-form-field>
      <mat-label>Identity document</mat-label>
      <input matInput>
    </mat-form-field>
    <mat-form-field>
      <mat-label>Badge number</mat-label>
      <input matInput>
    </mat-form-field>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button matDialogClose>Cancel</button>
  <button mat-button matDialogClose>Create</button>
</mat-dialog-actions>

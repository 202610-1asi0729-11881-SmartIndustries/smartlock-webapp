<h2 matDialogTitle>{{ isEdit ? 'Edit person' : 'Create person' }}</h2>
<mat-dialog-content>
  <mat-form-field>
    <mat-label>First name</mat-label>
    <input matInput [(ngModel)]="firstName" name="firstName" required>
  </mat-form-field>
  <mat-form-field>
    <mat-label>Last name</mat-label>
    <input matInput [(ngModel)]="lastName" name="lastName" required>
  </mat-form-field>
  <mat-form-field>
    <mat-label>Identity document</mat-label>
    <input matInput [(ngModel)]="identityDocument" name="identityDocument" required>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button matDialogClose>Cancel</button>
  <button mat-button [disabled]="store.loading() || !firstName || !lastName || !identityDocument" (click)="submit()">{{ isEdit ? 'Save' : 'Create' }}</button>
</mat-dialog-actions>

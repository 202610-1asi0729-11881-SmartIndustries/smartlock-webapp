<table mat-table [dataSource]="sites()">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>{{'sites.table.id' | translate}}</th>
    <td mat-cell *matCellDef="let element">{{element.id}}</td>
  </ng-container>
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>{{'sites.table.name' | translate}}</th>
    <td mat-cell *matCellDef="let element">{{element.name}}</td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let element">
      <button mat-icon-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="editSite(element)">Edit</button>
        <button mat-menu-item (click)="deleteSite(element)">Delete</button>
      </mat-menu>
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="sitesColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: sitesColumns"></tr>
</table>

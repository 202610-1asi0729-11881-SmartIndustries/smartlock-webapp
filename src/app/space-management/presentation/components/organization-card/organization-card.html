<mat-card appearance="outlined" (click)="openOrganization()" role="button" tabindex="0">
  <mat-card-header>
    <div class="header-content">
      <div>
        <mat-card-title>{{organization().name}}</mat-card-title>
        <mat-card-subtitle>{{organization().ownerName}}</mat-card-subtitle>
      </div>
      <button mat-icon-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
        <mat-icon>more_vert</mat-icon>
      </button>
    </div>
  </mat-card-header>

  <mat-card-content>
    <p>{{organization().description}}</p>
  </mat-card-content>

</mat-card>

<mat-menu #menu="matMenu">
  <button mat-menu-item>{{"home.menu.edit" | translate}}</button>
  <button mat-menu-item (click)="openDeleteDialog()">{{"home.menu.delete" | translate}}</button>
</mat-menu>

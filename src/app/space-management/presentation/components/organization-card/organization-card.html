<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ organization().name }}</mat-card-title>

    <mat-card-subtitle>Owner: {{ organization().owner }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <p>{{ organization().description }}</p>
  </mat-card-content>
</mat-card>

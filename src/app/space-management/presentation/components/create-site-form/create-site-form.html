<h2 matDialogTitle>{{ isEdit ? 'Edit site' : 'Create site' }}</h2>
<mat-dialog-content>
  <mat-form-field>
    <mat-label>Name</mat-label>
    <input matInput [(ngModel)]="name" name="name" required>
  </mat-form-field>
  <mat-form-field>
    <mat-label>Description</mat-label>
    <textarea matInput rows="3" [(ngModel)]="description" name="description"></textarea>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button matDialogClose>Cancel</button>
  <button mat-button [disabled]="store.loading() || !name" (click)="submit()">{{ isEdit ? 'Save' : 'Create' }}</button>
</mat-dialog-actions>

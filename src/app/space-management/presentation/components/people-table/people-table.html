<table mat-table [dataSource]="people()">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let element">{{element.id}}</td>
  </ng-container>
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let element">{{element.name}}</td>
  </ng-container>
  <ng-container matColumnDef="currentLocation">
    <th mat-header-cell *matHeaderCellDef>Current location</th>
    <td mat-cell *matCellDef="let element">{{element.currentLocation}}</td>
  </ng-container>
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let element">{{element.status}}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="peopleColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: peopleColumns"></tr>
</table>

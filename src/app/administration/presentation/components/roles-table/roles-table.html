<table mat-table [dataSource]="roles">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>{{'roles.table.id' | translate}}</th>
    <td mat-cell *matCellDef="let element">{{element.id}}</td>
  </ng-container>
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>{{'roles.table.name' | translate}}</th>
    <td mat-cell *matCellDef="let element">{{element.name}}</td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="rolesColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: rolesColumns"></tr>
</table>

<table mat-table [dataSource]="roles()">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>{{'roles.table.name' | translate}}</th>
    <td mat-cell *matCellDef="let element">{{element.name}}</td>
  </ng-container>
  <ng-container matColumnDef="deletable">
    <th mat-header-cell *matHeaderCellDef>Deletable</th>
    <td mat-cell *matCellDef="let element">{{element.deletable ? 'Yes' : 'No'}}</td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let element">
      @if (element.name !== 'Root') {
        <button mat-icon-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="editRole(element)">Edit</button>
        </mat-menu>
      }
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="rolesColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: rolesColumns"></tr>
</table>

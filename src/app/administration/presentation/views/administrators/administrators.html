<h1>{{'administrators.title' | translate}}</h1>
<div class="filters">
  <div>
    <mat-form-field appearance="outline">
      <mat-label>{{'administrators.filters.role' | translate}}</mat-label>

      <mat-select>
        @for (option of rolesOptions; track option) {
          <mat-option [value]="option">
            {{ option }}
          </mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>
  <button matIconButton="outlined" (click)="openInviteAdministratorForm()">
    <mat-icon>add</mat-icon>
  </button>
</div>
<app-administrators-table [administrators]="store.administrators()"/>

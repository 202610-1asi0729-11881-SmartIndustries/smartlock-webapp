<h1>Groups</h1>
<div class="filters">
  <div>
    <app-search-bar/>

    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>

      <mat-select>
        @for (option of statusOptions; track option) {
          <mat-option [value]="option">
            {{ option }}
          </mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Current site</mat-label>

      <mat-select>
        @for (option of siteOptions; track option) {
          <mat-option [value]="option">
            {{ option }}
          </mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>
  <button matIconButton="outlined" (click)="openCreateRuleForm()">
    <mat-icon>add</mat-icon>
  </button>
</div>
<app-access-groups-table/>

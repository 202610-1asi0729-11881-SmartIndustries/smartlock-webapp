<h1>{{'alerts.title' | translate}}</h1>
<div class="filters">
  <mat-form-field appearance="outline">
    <mat-label>{{'alerts.filters.site' | translate}}</mat-label>
    <mat-select>
      @for (option of siteOptions; track option) {
        <mat-option [value]="option">{{ option }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>{{'alerts.filters.status' | translate}}</mat-label>
    <mat-select>
      @for (option of statusOptions; track option) {
        <mat-option [value]="option">{{ option }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>
<app-alerts-table [alerts]="store.alerts()"/>

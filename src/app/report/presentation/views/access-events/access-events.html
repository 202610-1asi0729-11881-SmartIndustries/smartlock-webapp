<h1>Access Events</h1>
<div class="filters">
  <div>
    <app-search-bar/>

    <mat-form-field appearance="outline">
      <mat-label>Type</mat-label>

      <mat-select>
        @for (option of typeOptions; track option) {
          <mat-option [value]="option">
            {{ option }}
          </mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>

      <mat-select>
        @for (option of statusOptions; track option) {
          <mat-option [value]="option">
            {{ option }}
          </mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>
  <button matIconButton="outlined">
    <mat-icon>add</mat-icon>
  </button>
</div>
<app-access-events-table/>

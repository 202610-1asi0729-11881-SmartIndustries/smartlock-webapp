<table mat-table [dataSource]="alerts">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>{{'alerts.table.id' | translate}}</th>
    <td mat-cell *matCellDef="let element">{{element.id}}</td>
  </ng-container>
  <ng-container matColumnDef="location">
    <th mat-header-cell *matHeaderCellDef>{{'alerts.table.location' | translate}}</th>
    <td mat-cell *matCellDef="let element">{{element.location}}</td>
  </ng-container>
  <ng-container matColumnDef="person">
    <th mat-header-cell *matHeaderCellDef>{{'alerts.table.person' | translate}}</th>
    <td mat-cell *matCellDef="let element">{{element.person}}</td>
  </ng-container>
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>{{'alerts.table.status' | translate}}</th>
    <td mat-cell *matCellDef="let element">{{element.status}}</td>
  </ng-container>
  <ng-container matColumnDef="date">
    <th mat-header-cell *matHeaderCellDef>{{'alerts.table.date' | translate}}</th>
    <td mat-cell *matCellDef="let element">{{element.date}}</td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="alertsColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: alertsColumns"></tr>
</table>
